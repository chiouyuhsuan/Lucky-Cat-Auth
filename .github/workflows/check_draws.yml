name: 台灣大樂透對獎核對

on:
  schedule:
    - cron: '0 15 * * 2'   # 週二 23:00 台灣時間（fetch 跑完 1 小時後）
    - cron: '0 15 * * 5'   # 週五 23:00 台灣時間
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install firebase-admin

      - name: Run check draws
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python scripts/check_draws.py
