name: 台灣大樂透開獎核對

on:
  schedule:
    - cron: '30 14 * * 2'   # 週二 22:30 台灣時間
    - cron: '30 14 * * 5'   # 週五 22:30 台灣時間
  workflow_dispatch:

jobs:
  check-lottery:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 firebase-admin lxml taiwanlottery

      - name: Run lottery checker
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python scripts/check_lottery.py
