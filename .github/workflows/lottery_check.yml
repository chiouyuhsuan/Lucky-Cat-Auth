name: 台灣大樂透開獎核對

on:
  schedule:
    # 週二 22:30 台灣時間 = UTC 14:30
    - cron: '30 14 * * 2'
    # 週五 22:30 台灣時間 = UTC 14:30
    - cron: '30 14 * * 5'
  workflow_dispatch:   # 手動觸發（測試用）

jobs:
  check-lottery:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 firebase-admin

      - name: Run lottery checker
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python scripts/check_lottery.py
