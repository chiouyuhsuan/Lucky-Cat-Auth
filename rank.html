<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>全球幸運貓排行榜 — LuckyCat</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Noto Sans TC','PingFang TC',sans-serif;background:#F4F2FB;color:#26215C;min-height:100vh}
.topnav{background:#FAF0FB;border-bottom:0.5px solid #CECBF6;padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:1000}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none}
.logo-icon{width:32px;height:32px;background:#7F77DD;border-radius:10px;display:flex;align-items:center;justify-content:center}
.logo-text{font-size:16px;font-weight:500;color:#3C3489}
.nav-links{display:flex;gap:4px}
.nav-link{padding:6px 12px;border-radius:8px;font-size:13px;color:#534AB7;text-decoration:none}
.nav-link:hover,.nav-link.active{background:#EEEDFE;font-weight:500}
.nav-cta{padding:7px 14px;background:#534AB7;color:#EEEDFE;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;font-family:inherit}
.wrap{max-width:900px;margin:0 auto;padding:20px 16px 60px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
@media(max-width:580px){.stats-row{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:#fff;border:0.5px solid #CECBF6;border-radius:12px;padding:14px;text-align:center}
.stat-val{font-size:22px;font-weight:500;margin-bottom:2px}
.stat-lbl{font-size:11px;color:#888780}

/* MAP */
.map-wrap{background:#fff;border:0.5px solid #CECBF6;border-radius:16px;overflow:hidden;margin-bottom:20px}
.map-topbar{padding:12px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid #CECBF6;flex-wrap:wrap;gap:8px}
.map-title{font-size:14px;font-weight:500}
.map-legend{display:flex;gap:14px;font-size:11px;color:#888780}
.leg{display:flex;align-items:center;gap:5px}
.leg-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
#leafmap{width:100%;height:380px;z-index:1}
@media(max-width:580px){#leafmap{height:240px}}

/* country banner */
.cc-banner{display:none;background:#EEEDFE;border-radius:12px;padding:11px 16px;margin-bottom:14px;align-items:center;justify-content:space-between}
.cc-banner.show{display:flex}
.cc-close{font-size:12px;color:#888780;cursor:pointer;padding:4px 10px;border:0.5px solid #AFA9EC;border-radius:20px;background:transparent;font-family:inherit}

/* FILTERS */
.filter-bar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px}
.f-group{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.f-lbl{font-size:12px;color:#888780;white-space:nowrap}
.chip{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:0.5px solid #CECBF6;background:#fff;color:#534AB7;transition:all .13s;font-family:inherit}
.chip:hover{background:#EEEDFE}
.chip.on{background:#534AB7;color:#EEEDFE;border-color:#534AB7}
.f-sep{width:1px;height:20px;background:#CECBF6}
.tag{display:inline-block;font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px}

/* RANK */
.rank-list{display:flex;flex-direction:column;gap:8px}
.rc{background:#fff;border:0.5px solid #CECBF6;border-radius:14px;padding:14px 16px;display:flex;align-items:flex-start;gap:12px}
.rc:hover{border-color:#AFA9EC}
.rc.mine{border:1.5px solid #7F77DD;background:#EEEDFE}
.rc-num{font-size:15px;font-weight:500;min-width:26px;flex-shrink:0;padding-top:2px}
.rc-photo{width:54px;height:54px;border-radius:10px;overflow:hidden;flex-shrink:0;background:#FAC775;border:1.5px solid #EF9F27;display:flex;align-items:center;justify-content:center;font-size:26px}
.rc-photo img{width:100%;height:100%;object-fit:cover}
.rc-body{flex:1;min-width:0}
.rc-name{font-size:15px;font-weight:500;margin-bottom:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.rc-meta{font-size:12px;color:#888780;margin-bottom:8px}
.balls{display:flex;gap:5px;flex-wrap:wrap}
.b{width:28px;height:28px;border-radius:50%;background:#7F77DD;color:#EEEDFE;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.b.sp{background:#EF9F27;color:#412402}
.rc-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.badge-me{font-size:10px;background:#7F77DD;color:#EEEDFE;padding:2px 8px;border-radius:10px}
.empty{text-align:center;padding:48px 16px;color:#888780}
.loading{display:flex;gap:6px;justify-content:center;padding:40px}
@keyframes bounce{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
.dot{width:8px;height:8px;border-radius:50%;background:#7F77DD}
.dot:nth-child(1){animation:bounce 1.2s infinite 0s}
.dot:nth-child(2){animation:bounce 1.2s infinite .2s}
.dot:nth-child(3){animation:bounce 1.2s infinite .4s}

/* Leaflet custom marker */
.cat-marker{background:#7F77DD;border:2.5px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,.25);cursor:pointer;transition:transform .15s}
.cat-marker:hover{transform:scale(1.25)}
.cat-marker.won{background:#EF9F27}
</style>
</head>
<body>

<nav class="topnav">
  <a class="logo" href="index.html">
    <div class="logo-icon">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <ellipse cx="10" cy="13" rx="7" ry="5.5" fill="#EEEDFE" opacity=".9"/>
        <polygon points="4,9 7,3 10,9" fill="#EEEDFE" opacity=".9"/>
        <polygon points="10,9 13,3 16,9" fill="#EEEDFE" opacity=".9"/>
        <circle cx="7.5" cy="11.5" r="1.5" fill="#3C3489"/>
        <circle cx="12.5" cy="11.5" r="1.5" fill="#3C3489"/>
        <ellipse cx="10" cy="14" rx="2" ry="1.2" fill="#F4C0D1"/>
      </svg>
    </div>
    <span class="logo-text">LuckyCat</span>
  </a>
  <div class="nav-links">
    <a class="nav-link" href="index.html">首頁</a>
    <a class="nav-link" href="index.html">上傳</a>
    <a class="nav-link active" href="rank.html">排行榜</a>
    <a class="nav-link" href="index.html" onclick="sessionStorage.setItem('goto','profile')">我的</a>
    <a class="nav-link" href="wall.html">貓咪牆</a>
    <a class="nav-link" href="about.html">關於</a>
  </div>
  <a class="nav-cta" href="index.html">開始選號</a>
</nav>

<div class="wrap">
  <h1 style="font-size:22px;font-weight:500;margin-bottom:4px">全球幸運貓排行榜</h1>
  <p style="font-size:14px;color:#534AB7;margin-bottom:20px">點擊地圖標記篩選國家，看看哪裡的貓最幸運</p>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-val" style="color:#534AB7" id="s-cats">—</div><div class="stat-lbl">全球貓咪</div></div>
    <div class="stat-card"><div class="stat-val" style="color:#3B6D11" id="s-prize">—</div><div class="stat-lbl">總中獎金額</div></div>
    <div class="stat-card"><div class="stat-val" style="color:#993C1D" id="s-countries">—</div><div class="stat-lbl">參與國家</div></div>
    <div class="stat-card"><div class="stat-val" style="color:#BA7517" id="s-wins">—</div><div class="stat-lbl">中獎紀錄</div></div>
  </div>

  <div class="map-wrap">
    <div class="map-topbar">
      <span class="map-title">貓咪世界分佈</span>
      <div class="map-legend">
        <div class="leg"><div class="leg-dot" style="background:#7F77DD"></div>有貓咪</div>
        <div class="leg"><div class="leg-dot" style="background:#EF9F27"></div>已中獎</div>
        <div class="leg" style="font-size:10px">圓圈大小 = 貓咪數量</div>
      </div>
    </div>
    <div id="leafmap"></div>
  </div>

  <div class="cc-banner" id="cc-banner">
    <span style="font-size:14px;font-weight:500;color:#3C3489" id="banner-txt"></span>
    <button class="cc-close" onclick="clearCC()">清除篩選 ✕</button>
  </div>

  <div class="filter-bar">
    <div class="f-group">
      <span class="f-lbl">排序</span>
      <button class="chip on" id="sort-wins"   onclick="setSort('wins')">中獎次數</button>
      <button class="chip"    id="sort-prize"  onclick="setSort('prize')">中獎金額</button>
      <button class="chip"    id="sort-newest" onclick="setSort('newest')">最新上傳</button>
    </div>
    <div class="f-sep"></div>
    <div class="f-group">
      <span class="f-lbl">樂透</span>
      <button class="chip on" id="lot-all" onclick="setLot('all')">全部</button>
      <button class="chip"    id="lot-tw"  onclick="setLot('tw')">🇹🇼 大樂透</button>
      <button class="chip"    id="lot-us"  onclick="setLot('us')">🇺🇸 Powerball</button>
      <button class="chip"    id="lot-jp"  onclick="setLot('jp')">🇯🇵 ロト6</button>
    </div>
  </div>

  <div id="rank-list">
    <div class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, getDoc, query, orderBy, limit }
  from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const cfg = {
  apiKey:"AIzaSyAP90Ihnh_ekNcchfPxdX-VuKdGmNDrktE",
  authDomain:"pangfu-pangji.firebaseapp.com",
  projectId:"pangfu-pangji",
  storageBucket:"pangfu-pangji.firebasestorage.app",
  messagingSenderId:"966100033494",
  appId:"1:966100033494:web:b03e4664570ffe9a24ce77"
};
const app = initializeApp(cfg);
const auth = getAuth(app);
const db   = getFirestore(app);
let me = null;
onAuthStateChanged(auth, u => { me = u; window._me = u; rerender(); });

// ── Load data ────────────────────────────────────────────
async function loadDraws() {
  try {
    const q = query(collection(db,'draws'), orderBy('createdAt','desc'), limit(300));
    const s = await getDocs(q); const a = [];
    s.forEach(d => a.push({id:d.id,...d.data()}));
    return a;
  } catch { return []; }
}
async function loadStats() {
  try { const s = await getDoc(doc(db,'stats','global')); return s.exists()?s.data():{}; }
  catch { return {}; }
}

const [draws, stats] = await Promise.all([loadDraws(), loadStats()]);
window._draws = draws;

// ── Stats ────────────────────────────────────────────────
const totalPrize = draws.reduce((s,d)=>s+(d.prizeAmount||0),0);
const totalWins  = draws.filter(d=>d.prizeAmount>0).length;
const countries  = [...new Set(draws.map(d=>d.countryCode).filter(Boolean))];
document.getElementById('s-cats').textContent     = (stats.totalCats||draws.length||0).toLocaleString();
document.getElementById('s-prize').textContent    = '$'+(totalPrize>=1000000?(totalPrize/1000000).toFixed(1)+'M':totalPrize>=1000?(totalPrize/1000).toFixed(0)+'K':totalPrize||0);
document.getElementById('s-countries').textContent= countries.length;
document.getElementById('s-wins').textContent     = totalWins;

// ── Helpers ───────────────────────────────────────────────
function flagEmoji(cc) {
  if(!cc||cc.length!==2) return '';
  return [...cc.toUpperCase()].map(c=>String.fromCodePoint(127397+c.charCodeAt())).join('');
}
window._flagEmoji = flagEmoji;

// Country centroids
const CENT = {
  TW:[25.0,121.5],JP:[35.7,139.7],US:[37,-96],TR:[39,35],DE:[51.2,10.4],
  GB:[52,-1],FR:[46.2,2.2],KR:[37.5,127.5],CN:[35,105],AU:[-26,134],
  BR:[-15,-50],CA:[57,-100],MX:[24,-102],IN:[20,77],ID:[-5,120],
  TH:[15,101],SG:[1.3,103.8],MY:[4,110],PH:[12,122],VN:[16,108],
  IT:[42,12],ES:[40,-4],RU:[60,90],ZA:[-30,25],EG:[26,30],
  NG:[9,8],AR:[-35,-64],CL:[-35,-71],CO:[4,-74],PL:[52,20],
  NL:[52.3,5.3],BE:[50.5,4.5],SE:[60,18],NO:[62,10],CH:[47,8],
  AT:[47,14],PT:[39,-8],GR:[38,23],UA:[49,32],HK:[22.3,114.2],
  NZ:[-41,174],SA:[24,45],AE:[24,54],IL:[31,35],
};

// ── Leaflet map ───────────────────────────────────────────
const map = L.map('leafmap', {
  center: [20, 15],
  zoom: 2,
  minZoom: 1,
  maxZoom: 6,
  worldCopyJump: true,
  zoomControl: true,
});

// Tile layer — CartoDB light (no API key needed)
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO',
  subdomains: 'abcd',
  maxZoom: 19,
}).addTo(map);

// Aggregate per country
const ccDraws={}, ccWins={}, ccPrize={}, ccNames={};
draws.forEach(d => {
  const cc = d.countryCode; if(!cc) return;
  ccDraws[cc]  = (ccDraws[cc]||0)+1;
  ccNames[cc]  = d.country||cc;
  if(d.prizeAmount>0){
    ccWins[cc]  = (ccWins[cc]||0)+1;
    ccPrize[cc] = (ccPrize[cc]||0)+(d.prizeAmount||0);
  }
});

// Add circle markers
Object.keys(ccDraws).forEach(cc => {
  const cent = CENT[cc];
  if(!cent) return;
  const count  = ccDraws[cc]||0;
  const wins   = ccWins[cc]||0;
  const prize  = ccPrize[cc]||0;
  const hasWin = wins > 0;
  const radius = Math.min(10 + Math.sqrt(count)*8, 40);
  const color  = hasWin ? '#EF9F27' : '#7F77DD';
  const fe     = flagEmoji(cc);
  const prizeStr = prize>0 ? `<br>中獎金額：$${prize>=1000000?(prize/1000000).toFixed(1)+'M':prize>=1000?(prize/1000).toFixed(0)+'K':prize}` : '';

  const circle = L.circleMarker(cent, {
    radius,
    fillColor: color,
    color: '#fff',
    weight: 2.5,
    opacity: 1,
    fillOpacity: 0.82,
  }).addTo(map);

  circle.bindTooltip(
    `<strong>${fe} ${ccNames[cc]||cc}</strong><br>${count} 隻貓咪 · ${wins} 次中獎${prizeStr}`,
    { direction:'top', offset:[0,-4], className:'leaflet-tooltip' }
  );

  circle.on('click', () => {
    window._ccF = cc;
    const banner = document.getElementById('cc-banner');
    document.getElementById('banner-txt').textContent =
      `${fe} ${ccNames[cc]||cc} — ${count} 隻貓咪 · ${wins} 次中獎`;
    banner.classList.add('show');
    rerender();
    // scroll down to list
    document.getElementById('rank-list').scrollIntoView({behavior:'smooth', block:'start'});
  });
});

window._map = map;

// ── Render list ───────────────────────────────────────────
function rerender() {
  let items = [...(window._draws||[])];
  const lotF = window._lotF||'all';
  const ccF  = window._ccF||'all';
  const srt  = window._srt||'wins';
  if(lotF!=='all') items=items.filter(d=>d.lotType===lotF);
  if(ccF!=='all')  items=items.filter(d=>d.countryCode===ccF);
  if(srt==='wins')   items.sort((a,b)=>(b.prizeLevel||0)-(a.prizeLevel||0)||(b.prizeAmount||0)-(a.prizeAmount||0));
  else if(srt==='prize') items.sort((a,b)=>(b.prizeAmount||0)-(a.prizeAmount||0));
  renderList(items, window._me);
}
window.rerender = rerender;

function renderList(items, user) {
  const el = document.getElementById('rank-list');
  if(!items.length){
    el.innerHTML=`<div class="empty"><div style="font-size:48px;margin-bottom:12px">🐱</div><p style="font-size:15px;font-weight:500;margin-bottom:5px">這裡還沒有貓咪</p><p style="font-size:13px">換個篩選或成為第一個！</p></div>`;
    return;
  }
  const uid = user?user.uid:null;
  el.innerHTML=`<div class="rank-list">${items.map((d,i)=>{
    const isMe = uid&&d.uid===uid;
    const rc   = i===0?'#BA7517':i===1?'#888780':i===2?'#993C1D':'#AFA9EC';
    const photo= d.photoThumb?`<img src="${d.photoThumb}" alt="${d.catName}"/>`:'🐱';
    const nums = [
      ...(d.numbers||[]).map(n=>`<div class="b">${String(n).padStart(2,'0')}</div>`),
      ...(d.special||[]).map(n=>`<div class="b sp">${String(n).padStart(2,'0')}</div>`)
    ].join('');
    const loc  = [d.city, d.country].filter(Boolean).join(', ');
    const fe   = flagEmoji(d.countryCode||'');
    // 三種狀態：已核對中獎 / 已核對未中獎 / 尚未核對(待開獎)
    const checked = !!d.checkedAt;
    const won     = d.prizeLevel > 0;
    const prizeTag = won
      ? `<div style="font-size:13px;font-weight:500;color:#3B6D11">$${(d.prizeAmount||0).toLocaleString()}</div><span class="tag" style="background:#EAF3DE;color:#27500A">中獎 ${d.prizeLevel}等</span>`
      : checked
        ? `<span class="tag" style="background:#FCEBEB;color:#791F1F">未中獎</span>`
        : `<span class="tag" style="background:#F4F2FB;color:#888780">待開獎</span>`;
    return `<div class="rc ${isMe?'mine':''}">
      <div class="rc-num" style="color:${rc}">${i+1}</div>
      <div class="rc-photo">${photo}</div>
      <div class="rc-body">
        <div class="rc-name">${d.catName||''}${isMe?'<span class="badge-me">我的</span>':''}</div>
        <div class="rc-meta">${fe} ${loc} · ${d.lotFlag||''} ${d.lotName||''} · ${d.date||''}</div>
        <div class="balls">${nums}</div>
      </div>
      <div class="rc-right">${prizeTag}</div>
    </div>`;
  }).join('')}</div>`;
}

rerender();
</script>

<script>
window._lotF='all'; window._ccF='all'; window._srt='wins';
function setSort(k){
  window._srt=k;
  document.querySelectorAll('[id^="sort-"]').forEach(e=>e.classList.remove('on'));
  document.getElementById('sort-'+k).classList.add('on');
  window.rerender&&window.rerender();
}
function setLot(k){
  window._lotF=k;
  document.querySelectorAll('[id^="lot-"]').forEach(e=>e.classList.remove('on'));
  document.getElementById('lot-'+k).classList.add('on');
  window.rerender&&window.rerender();
}
function clearCC(){
  window._ccF='all';
  document.getElementById('cc-banner').classList.remove('show');
  window.rerender&&window.rerender();
}
</script>
</body>
</html>
